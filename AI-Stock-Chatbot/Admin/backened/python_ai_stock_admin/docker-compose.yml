version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ai_stock_db
    environment:
      POSTGRES_DB: ai_stock_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ai_stock_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/ai_stock_db
      SYNC_DATABASE_URL: postgresql://postgres:password@db:5432/ai_stock_db
      SECRET_KEY: change-me-in-production-use-long-random-string
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
